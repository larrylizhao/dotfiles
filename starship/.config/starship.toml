"$schema" = 'https://starship.rs/config-schema.json'

# ── General ────────────────────────────────────
add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold lavender"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "bold red"

[git_commit]
tag_symbol = '  '

[cmd_duration]
min_time = 3000
format = "took [$duration]($style) "
style = "bold yellow"

[package]
disabled = true

# ── Language Symbols ───────────────────────────
[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = "󱘗 "

[golang]
symbol = " "

[java]
symbol = " "

[lua]
symbol = " "

[c]
symbol = " "

[docker_context]
symbol = " "

[aws]
symbol = " "

[gcloud]
symbol = " "

[hostname]
ssh_symbol = " "
