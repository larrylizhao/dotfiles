# ─── 基础设置 ───────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g prefix C-s
unbind C-b
bind C-s send-prefix

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── 新建 window：默认进入 session 所在目录（而非当前 pane 漫游到的目录）──
bind c new-window -c "#{session_path}"

# ─── 分屏（保留原有快捷键 + 继承路径）────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── 面板调整 ─────────────────────────────
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5

# ─── Rosé Pine 配色 ──────────────────────
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-style "bg=#191724,fg=#e0def4"

set -g status-left "#[bg=#c4a7e7,fg=#191724,bold]  #S #[bg=#191724,fg=#c4a7e7] "
set -g status-left-length 30

set -g window-status-format "#[fg=#908caa]  #I:#(bash ~/.config/tmux/window-icon.sh '#W') "
set -g window-status-current-format "#[bg=#26233a,fg=#ebbcba,bold]  #I:#(bash ~/.config/tmux/window-icon.sh '#W') "
set -g window-status-separator ""

set -g status-right "#[fg=#9ccfd8] %H:%M #[bg=#9ccfd8,fg=#191724,bold] 󰃰 %m-%d "
set -g status-right-length 40

set -g pane-border-style "fg=#26233a"
set -g pane-active-border-style "fg=#c4a7e7"
set -g message-style "bg=#f6c177,fg=#191724"

# ─── 剪贴板同步 ─────────────────────────────
set -s copy-command "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── 会话保存 / 恢复（resurrect + continuum）────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'   # 恢复 pane 滚动内容
set -g @continuum-restore 'on'                  # tmux 启动时自动恢复（重启电脑后生效）
set -g @continuum-save-interval '15'            # 每 15 分钟自动存档
set -g @resurrect-processes 'claude "~claude --continue"'  # 额外恢复 claude 并自动续接会话

# 手动键改用大写，避免顶掉 prefix C-s (send-prefix)
set -g @resurrect-save 'S'      # prefix + S 手动存档
set -g @resurrect-restore 'R'   # prefix + R 手动恢复

# 一键 reload 配置（覆盖默认的 refresh-client）
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded ✓"

# 初始化 TPM —— 必须放在配置文件最后一行
run '~/.config/tmux/plugins/tpm/tpm'
